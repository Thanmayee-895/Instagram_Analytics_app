<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IG Analytics Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 font-sans overflow-hidden">

    <!-- PAGE 1: LANDING -->
    <div id="landingPage" class="h-screen flex flex-col items-center justify-center bg-gradient-to-br from-indigo-900 via-blue-800 to-blue-900 text-white p-6">
        <div class="mb-8 flex flex-col items-center">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" class="w-24 mb-4 shadow-2xl rounded-3xl">
            <h1 class="text-5xl font-extrabold tracking-tight">Social Media Analytics</h1>
            <p class="text-blue-200 mt-2 text-lg">Deep Insights for Instagram Profiles</p>
        </div>
        <div class="bg-white/10 backdrop-blur-md p-8 rounded-3xl border border-white/20 shadow-2xl w-full max-w-lg">
            <input type="text" id="usernameInput" placeholder="Enter Username " class="w-full p-4 rounded-2xl bg-white text-slate-800 outline-none border-none text-lg mb-4 shadow-inner">
            <button onclick="startAnalysis()" class="w-full bg-gradient-to-r from-pink-500 to-orange-500 p-4 rounded-2xl font-bold text-xl hover:scale-105 transition-all shadow-lg active:scale-95">Analyze Profile</button>
        </div>
    </div>

    <!-- PAGE 2: DASHBOARD -->
    <div id="dashboardPage" class="hidden flex h-screen w-full">
        <aside class="w-72 bg-[#2D3A82] text-white p-8 flex flex-col shadow-2xl">
            <div class="flex items-center gap-3 mb-12 font-bold text-xl uppercase tracking-tighter">
                <div class="w-8 h-8 bg-gradient-to-tr from-pink-500 to-orange-500 rounded-lg"></div>
                IG ANALYTICS
            </div>
            <nav class="flex-1 space-y-4">
                <div class="nav-btn active" onclick="switchTab('Dashboard')">📊 Dashboard</div>
                <div class="nav-btn" onclick="switchTab('Sentiment')">😊 Sentiment Analysis</div>
                <div class="nav-btn" onclick="switchTab('Engagement')">🔥 Engagement Metrics</div>
                <div class="nav-btn" onclick="switchTab('Hashtags')">#️⃣ Hashtag Analysis</div>
            </nav>
            <button onclick="location.reload()" class="mt-auto text-slate-400 hover:text-white text-sm">← Back to Search</button>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden bg-[#F8FAFC]">
            <header class="h-24 bg-white border-b px-10 flex items-center justify-between">
                <h2 id="viewTitle" class="text-2xl font-black text-slate-800 uppercase tracking-widest">Dashboard</h2>
                <div class="flex items-center gap-4 bg-slate-50 p-2 pr-6 rounded-full border">
                    <div id="userAvatar" class="w-12 h-12 bg-indigo-600 rounded-full flex items-center justify-center text-white font-bold">U</div>
                    <div class="leading-tight">
                        <p id="displayUsername" class="font-black text-slate-800">@username</p>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Premium Account</p>
                    </div>
                </div>
            </header>

            <section class="flex-1 overflow-y-auto p-10">
                <div id="view-Dashboard" class="tab-content space-y-8">
                    <div class="grid grid-cols-4 gap-6" id="statsRow"></div>
                    <div class="grid grid-cols-2 gap-8">
                        <div class="bg-white p-8 rounded-[32px] shadow-sm border h-96"><canvas id="sentMain"></canvas></div>
                        <div class="bg-white p-8 rounded-[32px] shadow-sm border h-96"><canvas id="engMain"></canvas></div>
                    </div>
                </div>

                <div id="view-Sentiment" class="tab-content hidden space-y-8">
                    <div class="grid grid-cols-3 gap-6" id="sentCardsRow"></div>
                    <div class="bg-white p-10 rounded-[32px] shadow-sm border"><div class="h-80"><canvas id="sentHistory"></canvas></div></div>
                </div>

                <div id="view-Engagement" class="tab-content hidden"><div class="bg-white p-10 rounded-[32px] shadow-sm border"><div class="h-[400px]"><canvas id="engDetailed"></canvas></div></div></div>

                <!-- FIXED: HASHTAG VIEW -->
                <div id="view-Hashtags" class="tab-content hidden">
                    <div class="bg-white p-12 rounded-[40px] shadow-sm border border-slate-100 min-h-[350px]">
                        <p class="font-bold text-slate-400 uppercase text-[10px] mb-10 tracking-[0.2em]">Profile Hashtags Intelligence</p>
                        <div id="finalHashtagBox" class="flex flex-wrap gap-6 items-center justify-start">
                            <!-- JS WILL INJECT DATA HERE -->
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
